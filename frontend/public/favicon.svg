      <stop offset="0%"   stop-color="#18181B"/>
      <stop offset="100%" stop-color="#09090B"/>
    </linearGradient>
  </defs>

  <rect width="200" height="200" rx="48" fill="url(#bg)"/>
  <rect width="200" height="200" rx="48" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

  <!-- Left slash -->
